name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: node -c src/cli.js src/bech32.js src/crypto.js src/envelope.js src/errors.js src/util.js src/index.js src/commands/keygen.js src/commands/encrypt.js src/commands/decrypt.js src/commands/recipient.js src/commands/inspect.js
      - run: npm test
