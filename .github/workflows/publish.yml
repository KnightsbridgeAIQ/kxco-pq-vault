name: publish

# Triggered by pushing a v* tag (e.g. v0.1.0), or manually via the Actions UI.
#
# Auth path: npm Trusted Publishing via GitHub Actions OIDC.
# Register at https://www.npmjs.com/settings/kxco/trusted-publishers
# binding org=JackKXCO, repo=kxco-pq-vault, workflow=publish.yml.
# No NPM_TOKEN secret. No NPM_OTP. Nothing rotates, nothing leaks.
# Provenance is minted automatically by the OIDC publish.
#
# All third-party actions are pinned by 40-char commit SHA.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to publish (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # required for both Trusted Publishing AND --provenance OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node 20 with npm registry
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm CLI to >=11.5.1
        # Node 20 ships npm 10.x. Trusted Publishing's OIDC integration was
        # added in npm 11.5.1 — older CLI versions fall through to a 404 PUT.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish (Trusted Publishing + provenance via OIDC)
        run: npm publish --provenance --access public
